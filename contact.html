<link rel="stylesheet" href="styles.css">

<body>

<div class="spotlight"></div>

<nav>

<section class="contact">

<script>
const spotlight = document.querySelector('.spotlight');
let mx = window.innerWidth/2, my = window.innerHeight/2, sx = mx, sy = my;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
(function loop(){ sx+=(mx-sx)*0.08; sy+=(my-sy)*0.08; spotlight.style.left=sx+'px'; spotlight.style.top=sy+'px'; requestAnimationFrame(loop); })();

const page = location.pathname.split('/').pop() || 'index.html';
document.querySelectorAll('nav .links a').forEach(a => { if(a.getAttribute('href')===page) a.classList.add('active'); });

document.querySelectorAll('.faq-item').forEach(item => {
  item.addEventListener('click', () => item.classList.toggle('open'));
});

console.log('%cHi.','font-family:"Instrument Serif",serif;font-size:32px;font-style:italic;color:#d4ff5e;');
console.log('%cIf you got this far, you\'re probably my kind of person. → hello@akhilmale.com','font-family:monospace;font-size:12px;color:#8a8a8a;');
</script>
